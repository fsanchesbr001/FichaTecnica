spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PWD}
spring.datasource.url=jdbc:mysql://${DB_IP}:${DB_PORT}/${DB_NAME}?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

site.origin.allowed=${SITE_ORIGIN_ALLOWED:https://seu-frontend.exemplo.com}

# Persistencia de uploads compartilhada com o volume Docker
# Use um path externo no host em ambientes de producao, se necessario.
digitalocean.storage.base-path=${DO_STORAGE_PATH:/olivander/ficha_tecnica/imagens}

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

