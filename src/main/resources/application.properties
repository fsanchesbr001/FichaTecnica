spring.profiles.active=${APP_PROFILE:development}
spring.application.name=fichaTecnica

spring.datasource.url=jdbc:mysql://${DB_IP:localhost}:${DB_PORT:3306}/${DB_NAME:FichaTecnica}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PWD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


api.security.token.secret=${JWT_SECRET:F@br1c10S@nch3s}

spring.datasource.hikari.idle-timeout=10000
spring.datasource.hikari.connection-timeout=20000

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.auto-commit=false
spring.datasource.hikari.transaction-isolation=TRANSACTION_READ_COMMITTED

# Caminho base para armazenamento no droplet DigitalOcean
digitalocean.storage.base-path=/olivander/ficha_tecnica/imagens

# Tamanho máximo do arquivo (50MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

