services:
  mysql:
    image: mysql:8.4
    container_name: ficha-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-}
      TZ: ${TIMEZONE}
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u${MYSQL_USER} -p${MYSQL_PASSWORD:-} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ficha-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      APP_PROFILE: ${APP_PROFILE:-development}
      DB_IP: mysql
      DB_PORT: 3306
      DB_NAME: ${MYSQL_DATABASE}
      DB_USER: ${MYSQL_USER}
      DB_PWD: ${MYSQL_PASSWORD:-}
      TZ: ${TIMEZONE}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_EXPIRATION_MINUTES: ${JWT_EXPIRATION_MINUTES:-120}
      MAIL_HOST: ${MAIL_HOST:-smtp.zoho.com}
      MAIL_PORT: ${MAIL_PORT:-465}
      MAIL_USER: ${MAIL_USER:-}
      MAIL_PWD: ${MAIL_PWD:-}
      SYSTEM_USER: ${SYSTEM_USER:-}
      SYSTEM_PWD: ${SYSTEM_PWD:-}
      SITE_ORIGIN_ALLOWED: ${SITE_ORIGIN_ALLOWED:-http://localhost:4200}
    ports:
      - "${APP_EXTERNAL_PORT:-8080}:8080"
    volumes:
      - uploads-data:/olivander/ficha_tecnica/imagens

  prometheus:
    image: prom/prometheus:latest
    container_name: ficha-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_EXTERNAL_PORT:-9090}:9090"
    depends_on:
      backend:
        condition: service_started

  grafana:
    image: grafana/grafana:latest
    container_name: ficha-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_EXTERNAL_PORT:-3000}:3000"
    depends_on:
      prometheus:
        condition: service_started

volumes:
  mysql-data:
  uploads-data:

